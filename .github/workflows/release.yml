name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Trigger when you push a tag like 'v0.2.2'

jobs:
  build-and-release:
    name: Build & Release Packages
    runs-on: ubuntu-latest
    
    # THE FIX: Explicitly grant write access so the token can create a release
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools rpm

      - name: Install Packaging Tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build Static Binary (MUSL)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build .deb Package
        run: cargo deb --target x86_64-unknown-linux-musl

      - name: Build .rpm Package
        run: |
          # Create a stripped dynamic build for RPM generation
          cargo build --release
          strip target/release/xdp-top
          cargo generate-rpm

      - name: Rename static binary for release
        run: |
          cp target/x86_64-unknown-linux-musl/release/xdp-top ./xdp-top-linux-x86_64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xdp-top-linux-x86_64
            target/debian/*.deb
            target/generate-rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}